<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpleChat Layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <header class="sidebar-header">
                <h3>Messages</h3>
            </header>
            <div class="contact-list">
                <div class="contact active">
                    <div class="avatar"></div>
                    <div class="contact-info">
                        <p class="name">Alex River</p>
                        <p class="preview">That sounds like a plan!</p>
                    </div>
                </div>
                </div>
        </aside>

        <main class="chat-area">
            <header class="chat-header">
                <h2>Alex River</h2>
            </header>

            <div class="message-history" id="chatWindow">
                <div class="message received">
                    <p>Hey! Did you see the new layout?</p>
                </div>
                <div class="message sent">
                    <p>I did! It's super clean and easy to customize.</p>
                </div>
            </div>

            <form class="input-area" id="messageForm">
                <input type="text" placeholder="Type a message..." id="messageInput">
                <button type="submit">Send</button>
            </form>
        </main>
    </div>
</body>
</html>
